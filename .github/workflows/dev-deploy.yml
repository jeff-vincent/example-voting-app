name: Dev Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: "registry:5000"
  TAG: "${{ github.actor }}-${{ github.sha }}"

jobs:
  build-and-deploy:
    runs-on: [self-hosted, "${{ github.actor }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean builds directory
        shell: bash
        run: |
          rm -f /builds/*.done /builds/*.request /builds/*.processing \
                /builds/*.apply /builds/*.apply-done /builds/*.apply-log \
                /builds/*.apply-exitcode /builds/*.exitcode \
                /builds/*.log /builds/*.dest /builds/*.tar.gz \
                /builds/*.yaml /builds/*.sh

      # -- Build all images --

      - name: Build result image
        uses: jeff-vincent/kindling/.github/actions/kindling-build@main
        with:
          name: result
          context: ${{ github.workspace }}/result
          image: "${{ env.REGISTRY }}/result:${{ env.TAG }}"

      - name: Build vote image
        uses: jeff-vincent/kindling/.github/actions/kindling-build@main
        with:
          name: vote
          context: ${{ github.workspace }}/vote
          image: "${{ env.REGISTRY }}/vote:${{ env.TAG }}"

      - name: Patch worker Dockerfile for Kaniko
        shell: bash
        run: |
          cd ${{ github.workspace }}/worker
          sed -i 's/FROM --platform=\${BUILDPLATFORM} /FROM /g' Dockerfile
          sed -i '/^ARG TARGETPLATFORM$/d' Dockerfile
          sed -i '/^ARG TARGETARCH$/d' Dockerfile
          sed -i '/^ARG BUILDPLATFORM$/d' Dockerfile
          sed -i '/^ARG TARGETOS$/d' Dockerfile
          sed -i '/^ARG TARGETVARIANT$/d' Dockerfile
          sed -i 's/\$TARGETARCH/amd64/g; s/\${TARGETARCH}/amd64/g' Dockerfile
          sed -i 's/\$TARGETPLATFORM/linux\/amd64/g; s/\${TARGETPLATFORM}/linux\/amd64/g' Dockerfile
          sed -i 's/\$BUILDPLATFORM/linux\/amd64/g; s/\${BUILDPLATFORM}/linux\/amd64/g' Dockerfile
          sed -i 's/\$TARGETOS/linux/g; s/\${TARGETOS}/linux/g' Dockerfile

      - name: Build worker image
        uses: jeff-vincent/kindling/.github/actions/kindling-build@main
        with:
          name: worker
          context: ${{ github.workspace }}/worker
          image: "${{ env.REGISTRY }}/worker:${{ env.TAG }}"
          timeout: "900"

      # -- Deploy in dependency order --

      - name: Deploy result
        uses: jeff-vincent/kindling/.github/actions/kindling-deploy@main
        with:
          name: "${{ github.actor }}-result"
          image: "${{ env.REGISTRY }}/result:${{ env.TAG }}"
          port: "80"
          ingress-host: "${{ github.actor }}-result.localhost"
          health-check-path: "/"
          labels: |
            app.kubernetes.io/part-of: example-voting-app
            app.kubernetes.io/component: result
            apps.example.com/github-username: ${{ github.actor }}
          dependencies: |
            - type: postgres
            - type: redis
          env: |
            - name: DATABASE_URL
              value: "postgres://postgres:$(POSTGRES_PASSWORD)@${{ github.actor }}-db-postgres:5432/postgres"
          # Requires: kindling secrets set POSTGRES_PASSWORD <VALUE>

      - name: Deploy vote
        uses: jeff-vincent/kindling/.github/actions/kindling-deploy@main
        with:
          name: "${{ github.actor }}-vote"
          image: "${{ env.REGISTRY }}/vote:${{ env.TAG }}"
          port: "80"
          ingress-host: "${{ github.actor }}-vote.localhost"
          health-check-path: "/"
          labels: |
            app.kubernetes.io/part-of: example-voting-app
            app.kubernetes.io/component: vote
            apps.example.com/github-username: ${{ github.actor }}
          dependencies: |
            - type: redis

      - name: Deploy worker
        uses: jeff-vincent/kindling/.github/actions/kindling-deploy@main
        with:
          name: "${{ github.actor }}-worker"
          image: "${{ env.REGISTRY }}/worker:${{ env.TAG }}"
          port: "80"
          ingress-host: "${{ github.actor }}-worker.localhost"
          labels: |
            app.kubernetes.io/part-of: example-voting-app
            app.kubernetes.io/component: worker
            apps.example.com/github-username: ${{ github.actor }}
          dependencies: |
            - type: postgres
            - type: redis
          env: |
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kindling-secret-postgres-password
                  key: value
          # Requires: kindling secrets set POSTGRES_PASSWORD <VALUE>
